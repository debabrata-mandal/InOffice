name: Android Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup release keystore from secrets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 is not set. Add it in repo Actions secrets."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Determine Version for Build
        id: build_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git fetch --tags --force || true
          latest_tag=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then latest_tag="v0.0.0"; fi
          echo "Latest tag: $latest_tag"

          version=$(echo "$latest_tag" | sed 's/v//')
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)

          commit_msg=$(echo "${{ github.event.head_commit.message }}" | head -n1 | tr -d '\n\r')
          echo "Commit message: $commit_msg"

          if [[ $commit_msg =~ ^(feat|feature)(\(.+\))?: ]]; then
            echo "Minor version bump (feature)"
            minor=$((minor + 1))
            patch=0
          elif [[ $commit_msg =~ ^(fix|bugfix|hotfix)(\(.+\))?: ]]; then
            echo "Patch version bump (fix)"
            patch=$((patch + 1))
          elif [[ $commit_msg =~ ^(chore|docs|style|refactor|perf|test)(\(.+\))?: ]]; then
            echo "Build number bump (chore)"
            patch=$((patch + 1))
          elif [[ $commit_msg =~ ^(BREAKING CHANGE|!): ]]; then
            echo "Major version bump (breaking change)"
            major=$((major + 1))
            minor=0
            patch=0
          else
            echo "Default patch version bump"
            patch=$((patch + 1))
          fi

          new_version="$major.$minor.$patch"
          new_tag="v$new_version"
          echo "New version: $new_version"
          echo "New tag: $new_tag"

          if git tag -l | grep -q "^$new_tag$"; then
            echo "Tag $new_tag already exists; incrementing patch."
            patch=$((patch + 1))
            new_version="$major.$minor.$patch"
            new_tag="v$new_version"
            echo "Updated version: $new_version"
            echo "Updated tag: $new_tag"
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Update Version in build.gradle.kts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.build_version.outputs.version }}\"/" app/build.gradle.kts
          new_code=${{ github.run_number }}
          sed -i "s/versionCode = .*/versionCode = $new_code/" app/build.gradle.kts
          echo "Updated versionName to ${{ steps.build_version.outputs.version }}"
          echo "Updated versionCode to $new_code"
          grep -E "(versionName|versionCode)" app/build.gradle.kts

      - name: Build with Gradle (release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease

      - name: Build with Gradle (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew test assembleDebug

      - name: Upload APK artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./apk

      - name: Get Version for Release
        id: version
        run: |
          git fetch --tags --force || true
          latest_tag=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then latest_tag="v0.0.0"; fi
          echo "Latest tag: $latest_tag"

          version=$(echo "$latest_tag" | sed 's/v//')
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)

          commit_msg=$(echo "${{ github.event.head_commit.message }}" | head -n1 | tr -d '\n\r')
          echo "Commit message: $commit_msg"

          if [[ $commit_msg =~ ^(feat|feature)(\(.+\))?: ]]; then
            minor=$((minor + 1))
            patch=0
          elif [[ $commit_msg =~ ^(fix|bugfix|hotfix)(\(.+\))?: ]]; then
            patch=$((patch + 1))
          elif [[ $commit_msg =~ ^(chore|docs|style|refactor|perf|test)(\(.+\))?: ]]; then
            patch=$((patch + 1))
          elif [[ $commit_msg =~ ^(BREAKING CHANGE|!): ]]; then
            major=$((major + 1))
            minor=0
            patch=0
          else
            patch=$((patch + 1))
          fi

          new_version="$major.$minor.$patch"
          new_tag="v$new_version"

          if git tag -l | grep -q "^$new_tag$"; then
            patch=$((patch + 1))
            new_version="$major.$minor.$patch"
            new_tag="v$new_version"
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: InOffice ${{ steps.version.outputs.tag }}
          body: |
            ## InOffice Android

            **Version:** ${{ steps.version.outputs.tag }}
            **Build number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Install

            1. Download the APK below.
            2. On your device, allow installing apps from unknown sources if prompted.
            3. Open the APK to install.

            ### Changes

            ${{ github.event.head_commit.message }}
          files: ./apk/app-release.apk
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
